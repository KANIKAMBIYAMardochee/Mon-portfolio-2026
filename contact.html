<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mon Portfolio</title>
    <link rel="stylesheet" href="css/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <div><a href="index.html">Mon Portfolio</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="projets.html">Projets</a></li>
                <li><a href="passions.html">Passions</a></li>
                <li><a href="divertissement.html">Divertissement</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <section class="contact-card">
            <h2>Contactez-moi</h2>
            <form class="formulaire-contact">
                <div class="groupe-input">
                    <label>Nom Complet</label>
                    <input type="text" placeholder="Votre nom..." required>
                </div>
                <div class="groupe-input">
                    <label>Email</label>
                    <input type="email" placeholder="votre@email.com" required>
                </div>
                <div class="groupe-input">
                    <label>Message</label>
                    <textarea rows="4" placeholder="Votre message..." required></textarea>
                </div>
                <button type="submit" class="bouton-envoi">Envoyer</button>
            </form>

            <div class="separation">OU</div>

            <a href="https://wa.me/243850593384" target="_blank" class="bouton-whatsapp">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
        </section>
    </main>

    <footer>
        <p>@ 2026 Mardochée. Tous droits réservés.</p>
    </footer>

</body>
</html>
